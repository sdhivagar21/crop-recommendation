<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Crop Advisor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #2d5a27; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #result-box { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f5e9; border: 1px solid #4CAF50; }
    </style>
</head>
<body>

<div class="card">
    <h2>Crop Recommendation</h2>
    <div class="form-group">
        <label>Soil Type</label>
        <select id="soil_type">
            <option value="Black">Black Soil</option>
            <option value="Alluvial">Alluvial Soil</option>
            <option value="Sandy">Sandy Soil</option>
        </select>
    </div>
    <div class="form-group">
        <label>pH Level</label>
        <input type="number" id="ph" value="6.5" step="0.1">
    </div>
    <div class="form-group">
        <label>Rainfall (mm)</label>
        <input type="number" id="rainfall" value="200">
    </div>
    <div class="form-group">
        <label>Temperature (°C)</label>
        <input type="number" id="temp" value="25">
    </div>
    <button onclick="getRecommendation()">Analyze with AI API</button>

    <div id="result-box">
        <p id="crop-text" style="font-weight:bold; color:#2d5a27; margin:0;"></p>
        <p id="advice-text" style="font-size:13px; color:#555; margin-top:5px;"></p>
    </div>
</div>

<script>
    async function getRecommendation() {
        const data = {
            soil_type: document.getElementById('soil_type').value,
            ph: document.getElementById('ph').value,
            rainfall: document.getElementById('rainfall').value,
            temp: document.getElementById('temp').value
        };

        try {
            // Pointing to your local Python API
            const response = await fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('crop-text').innerText = "Recommended: " + result.crop;
            document.getElementById('advice-text').innerText = result.advice;
        } catch (error) {
            alert("API Error: Make sure your Python server (app.py) is running!");
        }
    }
</script>

</body>
</html>
